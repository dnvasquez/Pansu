<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/logo_movil.png" type="image/png">
    <title>Acceso Administracion | PANSU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
      :root {
        --primary: #f2c14e;
        --dark: #101a12;
        --surface: #ffffff;
        --border: #e1e7df;
        --text-muted: #5d6b60;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Open Sans', sans-serif;
        color: var(--dark);
        background:
          radial-gradient(circle at top, rgba(242, 193, 78, .18), transparent 32%),
          linear-gradient(180deg, #f7faf5 0%, #edf3ed 100%);
      }
      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }
      .login-card {
        width: min(100%, 420px);
        border: 1px solid rgba(225, 231, 223, .95);
        border-radius: 20px;
        background: rgba(255, 255, 255, .96);
        padding: 28px 24px;
        box-shadow: 0 18px 40px rgba(16, 26, 18, .10);
      }
      .brand-mark {
        display: block;
        width: 190px;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }
      .eyebrow {
        display: block;
        margin-top: 18px;
        color: #4d6655;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        text-align: center;
      }
      .login-card-header {
        margin: 12px 0 18px;
        text-align: center;
      }
      .login-card-title {
        margin: 0 0 8px;
        font-family: 'Oswald', sans-serif;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: .02em;
      }
      .login-card-copy {
        color: var(--text-muted);
        font-size: 14px;
        margin: 0;
      }
      .form-label {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: #152016;
      }
      .form-control {
        border: 1px solid var(--border);
        border-radius: 12px;
        min-height: 50px;
        padding: 12px 14px;
        font-size: 15px;
      }
      .form-control:focus {
        border-color: rgba(242, 193, 78, .95);
        box-shadow: 0 0 0 .25rem rgba(242, 193, 78, .18);
      }
      .btn-login {
        min-height: 50px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--primary) 0%, #eebf47 100%);
        color: var(--dark);
        font-size: 14px;
        font-weight: 800;
        letter-spacing: .06em;
        text-transform: uppercase;
        box-shadow: 0 12px 24px rgba(242, 193, 78, .24);
      }
      .btn-login:hover,
      .btn-login:focus {
        background: linear-gradient(135deg, #f6cb63 0%, #d8ab35 100%);
        color: var(--dark);
      }
      .login-note {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid #edf2ed;
        color: var(--text-muted);
        font-size: 13px;
        text-align: center;
      }
      .status {
        min-height: 24px;
        font-size: 13px;
        margin-top: 10px;
        font-weight: 700;
      }
      @media (max-width: 576px) {
        .login-card {
          padding: 22px 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-label="Formulario de acceso">
        <img class="brand-mark" src="images/logo_web_hor2.png" alt="Pansu">
        <span class="eyebrow">Panel de administracion</span>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label" for="username">Usuario</label>
            <input class="form-control" id="username" name="username" type="text" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Clave</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-login w-100" type="submit">Ingresar</button>
          <p class="status mb-0" id="status"></p>
        </form>
        <p class="login-note mb-0">El acceso a esta sección es restringida</p>
      </section>
    </main>

    <script src="js/cms-client.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
